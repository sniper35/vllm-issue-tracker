topics:
  diffusion_image_video:
    description: Diffusion, image, and video generation issues for Hunyuan, Wan, Qwen-Image, Flux, GLM-Image, DiT, VAE, and related pipelines.
    queries:
      - 'diffusion -linked:pr'
      - 'Hunyuan -linked:pr'
      - 'Wan2 -linked:pr'
      - 'Qwen-Image -linked:pr'
      - 'image video -linked:pr'

  tts_audio_voice:
    description: TTS, audio, speech, voice cloning, Qwen3-TTS, CosyVoice, VoxCPM, MiMo-Audio, and streaming audio behavior.
    queries:
      - 'Qwen3-TTS -linked:pr'
      - 'tts -linked:pr'
      - 'audio speech -linked:pr'
      - 'voice cloning -linked:pr'
      - 'CosyVoice -linked:pr'

  qwen3_omni:
    description: Qwen3-Omni model-family issues including thinker/talker behavior, multimodal streaming, prefix caching, and stage transfer.
    queries:
      - 'Qwen3-Omni -linked:pr'
      - 'Qwen3 Omni -linked:pr'
      - 'thinker talker -linked:pr'
      - 'Daily-Omni -linked:pr'

  ci_testing_regressions:
    description: CI failures, accuracy/performance regressions, nightly coverage, Buildkite failures, and flaky test failures.
    queries:
      - 'ci-failure -linked:pr'
      - 'CI Failure -linked:pr'
      - 'accuracy test -linked:pr'
      - 'function test -linked:pr'
      - 'nightly test -linked:pr'

  orchestrator_engine_pipeline:
    description: Orchestrator, engine layer, model runner, multi-stage pipeline, stage overrides, and pipeline protocol issues.
    queries:
      - 'orchestrator -linked:pr'
      - 'engine layer -linked:pr'
      - 'model runner -linked:pr'
      - 'multi-stage -linked:pr'
      - 'stage pipeline -linked:pr'

  serving_api_entrypoints:
    description: Online serving, OpenAI-compatible endpoints, websocket/streaming APIs, entrypoints, request/response semantics, and abnormal input behavior.
    queries:
