      - 'FP8 -linked:pr'
      - 'AutoRound -linked:pr'
      - 'GGUF -linked:pr'
      - 'ModelOpt -linked:pr'

  robotics_world_models:
    description: Robotics, world model, VLA, GR00T, Isaac, autonomous driving, and related model integrations.
    queries:
      - 'robotics -linked:pr'
      - 'world model -linked:pr'
      - 'VLA -linked:pr'
      - 'Isaac GR00T -linked:pr'
      - 'autonomous driving -linked:pr'

